<!DOCTYPE html>
<html>
<head>
    <title>Book Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 col-md-6">
    <div class="card shadow-lg p-4">
        <h3>Booking for {{ hotel_name }}</h3>

        <form method="POST">

            <label>Your Name</label>
            <input type="text" name="name" class="form-control mb-3" required>

            <label>Phone Number</label>
            <input type="text" name="phone" class="form-control mb-3" required>

            <label>Number of Rooms</label>
            <input type="number" name="rooms" class="form-control mb-3" min="1" required>

            <button class="btn btn-success w-100">Confirm Booking</button>
        </form>
    </div>
</div>

</body>
</html>
